<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=340">
  <title>Extract</title>
  <link rel="stylesheet" href="popup.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>
  <div class="popup-container">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <svg class="header-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
          <polyline points="7 10 12 15 17 10" />
          <line x1="12" y1="15" x2="12" y2="3" />
        </svg>
        <h1 class="header-title">Extract</h1>
      </div>
      <div class="header-actions">
        <button id="settingsBtn" class="icon-btn" title="Configurações">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3" />
            <path
              d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />
          </svg>
        </button>
        <button id="exportBtn" class="icon-btn" title="Export log (JSON)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
            <polyline points="14 2 14 8 20 8" />
            <line x1="16" y1="13" x2="8" y2="13" />
            <line x1="16" y1="17" x2="8" y2="17" />
          </svg>
        </button>
        <button id="clearBtn" class="icon-btn" title="Clear all">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6" />
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
          </svg>
        </button>
      </div>
    </header>

    <div class="separator"></div>

    <!-- Settings Panel (collapsible) -->
    <div class="settings-panel" id="settingsPanel">
      <div class="settings-row">
        <label class="settings-label" for="outputDirInput">📂 Onde salvar os vídeos?</label>
        <div class="settings-input-group">
          <input type="text" id="outputDirInput" class="settings-input" placeholder="Ex: C:\Aulas (Opcional)" />
          <button id="saveOutputDir" class="settings-save-btn ghost" title="Salvar pasta local">Salvar</button>
        </div>
        <span class="settings-help">Deixe em branco para usar sua pasta de Downloads padrão.</span>
      </div>
    </div>

    <!-- Request List -->
    <main class="request-list" id="requestList">
      <!-- Rendered by JS -->
    </main>

    <!-- Empty State -->
    <div class="empty-state" id="emptyState">
      <svg class="empty-icon" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10" />
        <path d="M12 6v6l4 2" />
      </svg>
      <p class="empty-title">Nenhuma requisição capturada</p>
      <p class="empty-desc">Abra uma página com embed do YouTube para inspecionar.</p>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <span class="footer-text" id="footerCount">0 requests</span>
      <span class="footer-text">All methods</span>
    </footer>

    <!-- Toast -->
    <div class="toast" id="toast">
      <span class="toast-icon" id="toastIcon">✓</span>
      <span class="toast-text" id="toastText">Copied!</span>
    </div>

    <!-- Download Progress -->
    <div class="download-bar" id="downloadBar">
      <div class="download-info">
        <span class="download-label" id="downloadLabel">Downloading...</span>
        <span class="download-percent" id="downloadPercent">0%</span>
      </div>
      <div class="download-track">
        <div class="download-fill" id="downloadFill"></div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>

</html>
